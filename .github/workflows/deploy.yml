name: Build and Deploy Android App

on:
  pull_request:
    branches:
      - main

#  For testing the action manually it can be done executing:
#  gh workflow run deploy.yml environment=release --ref <Branch>
#  gh run list --workflow=deploy.yml
#
#    workflow_dispatch:

jobs:
  build_and_deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'adopt'

      #      - name: Decode google-services.json
      #        env:
      #          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
      #        run: echo $FIREBASE_JSON > app/google-services.json

      - name: Create local.properties
        run: |
          echo "ADMOB_APP_ID_ANDROID=${{ secrets.ADMOB_APP_ID_ANDROID }}" >> local.properties
          echo "ADMOB_NATIVE_ID_ANDROID=${{ secrets.ADMOB_NATIVE_ID_ANDROID }}" >> local.properties
          echo "ADMOB_BANNER_ID_ANDROID=${{ secrets.ADMOB_BANNER_ID_ANDROID }}" >> local.properties
          echo "ADMOB_APP_ID_IOS=${{ secrets.ADMOB_APP_ID_IOS }}" >> local.properties
          echo "ADMOB_NATIVE_ID_IOS=${{ secrets.ADMOB_NATIVE_ID_IOS }}" >> local.properties
          echo "ADMOB_BANNER_ID_IOS=${{ secrets.ADMOB_BANNER_ID_IOS }}" >> local.properties

      - name: Assemble
        run: ./gradlew assembleRelease bundleRelease

      # https://github.com/r0adkll/sign-android-release
      - name: Sign Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_B64 }}
          alias: ${{ secrets.SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # https://github.com/actions/upload-artifact
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: |
            composeApp/build/outputs/bundle/release/**/*.aab
            composeApp/build/outputs/bundle/**/*.aab
            composeApp/build/outputs/apk/**/*.apk
            composeApp/build/outputs/apk/
            composeApp/release/*.aab
            composeApp/release/*.apk

      # https://github.com/r0adkll/upload-google-play
      - name: Publish to Google Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_GOOGLE_PLAY_CONSOLE_JSON }}
          packageName: com.apptolast.fiscsitmonitor
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: internal
          status: draft
          whatsNewDirectory: distribution/whatsnew
        continue-on-error: true

